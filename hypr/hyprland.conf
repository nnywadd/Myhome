# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf
debug {
disable_logs = false
enable_stdout_logs = true
}
################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto
monitor = samsung, 3840x2160@60, 0x0, 1.25

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = xfce4-terminal
$fileManager = thunar
$menu = rofi -show drun -theme lb -font "Press Start 2P 10" -location 0 -width 100 -icon-theme "Sovietec-OS" -show-icons
$browser = librewolf
$browser2 = zen
$browser3 = /opt/brave.com/brave/brave-browser
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
# The name must match the folder name in ~/.local/share/icons exactly
env = HYPRCURSOR_THEME,Future-Cyan-Hyprcursor_Theme
env = HYPRCURSOR_SIZE,42
# Recommended: keep XCursor in sync for older apps (GIMP, etc.)
env = XCURSOR_THEME,Future-Cyan-Hyprcursor_Theme
env = XCURSOR_SIZE,42
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = nm-applet &
exec-once = waybar & hyprpaper
#exec-once = gsettings set org.gnome.desktop.peripherals.touchpad send-events 'disabled'
#exec-once = dbus-launch xfce4-panel &
#exec-once = xfsettingsd &
exec-once = blueman-applet &
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1 &
#############################
### ENVIRONMENT VARIABLES ###
#############################
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = WLR_NO_HARDWARE_CURSORS,1
env = HSA_OVERRIDE_GFX_VERSION,11.0.0
# ...and so on
# See https://wiki.hyprland.org/Configuring/Environment-variables/
#env = GTK_THEME,AvionX
env = GTK_THEME,JohnnyCyan
# Add these to your ~/.config/hypr/hyprland.conf
#env = QT_QPA_PLATFORMTHEME,qt6ct
#env = QT_QPA_PLATFORM,wayland
#env = XCURSOR_SIZE,24
#env = HYPRCURSOR_SIZE,24
# Force Qt to use the Configuration Tools (Pro Build)
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct  # You can keep both; they coexist fine
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Vulkan / GPU Optimization for your 7800 XT
env = DISABLE_LAYER_AMD_SWITCHABLE_GRAPHICS_1,1
env = AMD_VULKAN_ICD,RADV
cursor {
    no_hardware_cursors = false # Set to true if you are on NVIDIA
    enable_hyprcursor = true
}
###################
###ps5 touchpad####
###########3#######
device {
    # Exact name found via hyprctl
    name = dualsense-wireless-controller-touchpad
    enabled = false
}


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 1

    # JohnnyCyan Unification: Replacing the blue/green gradient with Cyan Core
    col.active_border = rgba(15F4EEff) 45deg
    col.inactive_border = rgba(1E2E3Eff)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(091018ee) # Matching your topbar_bg
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# This works WITH the above, specifically for tabbed windows
group {
    col.border_active = 0xff15F4EE # Cyan Core Glow
    col.border_inactive = 0xff1E2E3E # Avion Blue
    
    groupbar {
        font_family = Press Start 2P
        font_size = 10
        text_color = 0xff15F4EE
        col.active = 0xff1E2E3E # Match window background
        col.inactive = 0xff091018 # Match topbar_bg
    }
}
# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = false
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
# Toggle the MUGEN arcade shader (follows the emulator cluster)
bind = $altMod, 7, exec, hyprshade toggle mugen_arcade
#invoke ai
bind = $altMod, I, exec, .local/bin/Invoke.Community.Edition-latest.AppImage
#retroarch
bind = $altMod, 1, exec, .local/bin/ES-DE_x64.AppImage  
#ps2
bind = $altMod, 2, exec, pcsx2-qt
#PS3
bind = $altMod, 3, exec, rpcs3
#ps4
bind = $altMod, 4, exec, .local/bin/shadPS4QtLauncher-qt.AppImage
#dolphin
bind = $altMod, 5, exec, dolphin-emu
#switch
bind = $altMod, 6, exec, /usr/share/ryujinx-1.3.61/Ryujinx
# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$altMod = alt #sets alts as alt mod
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $altMod, W, exec, $browser3
bind = $mainMod, Z, exec, $browser2
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl kill 
bind = $mainMod, M, exec, mousepad
bind = $mainMod, C, exec, hyprshot -m window
bind = $mainMod, F, exec, $fileManager
bind = $altMod, T, togglefloating,
bind = $altMod, F ,fullscreen
bind = $mainMod, G, exec, steam  
# Toggle Mako Do-Not-Disturb
bind = $mainMod SHIFT, D, exec, makoctl mode | grep -q "do-not-disturb" && makoctl mode -r do-not-disturb || makoctl mode -a do-not-disturb
bind = $mainMod, A, exec, pavucontrol-qt
bind = $mainMod, B, exec, blueman-manager
bind = $mainMod, P, exec, hyprshot -m output
bind = $mainMod, U, exec, .local/bin/gpt4all/bin/chat
bind = $mainMod SHIFT, P, exec, hyprshot -m region 
bind = $mainMod, SPACE, exec, $menu
bind = $altMod, S, layoutmsg, pseudo
#bind = $mainMod, PERIOD, togglesplit, # dwindle
bind = $mainMod, PERIOD, layoutmsg, togglesplit
bind = $mainMod, X, exec, .local/bin/shutdown.sh
bind = $altMod, D, exec, hyprctl dismissnotify
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# Move active window to a workspace SILENTLY with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
# Move active window to a workspace with mainMod + SHIFT + [0-9]
#bind = $mainMod SHIFT, 1, movetoworkspace, 1
#bind = $mainMod SHIFT, 2, movetoworkspace, 2
#bind = $mainMod SHIFT, 3, movetoworkspace, 3
#bind = $mainMod SHIFT, 4, movetoworkspace, 4
#bind = $mainMod SHIFT, 5, movetoworkspace, 5
#bind = $mainMod SHIFT, 6, movetoworkspace, 6
#bind = $mainMod SHIFT, 7, movetoworkspace, 7
#bind = $mainMod SHIFT, 8, movetoworkspace, 8
#bind = $mainMod SHIFT, 9, movetoworkspace, 9
#bind = $mainMod SHIFT, 0, movetoworkspace, 10
# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
